name = "mai-fitness-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "mai-db"
database_id = "7ff735b0-89fc-4534-91aa-e5851f6de505"
migrations_dir = "migrations"

# Non-secret vars. Secrets (JWT_SECRET, API keys) are set via `wrangler secret put`
# or in .dev.vars for local dev.
[vars]
GOOGLE_CLIENT_ID = "REPLACE_WITH_GOOGLE_OAUTH_WEB_CLIENT_ID"
ALLOWED_ORIGINS = "http://localhost:8081,http://localhost:19006,https://auth.expo.io"
# Current Anthropic model IDs as of 2026-Q1. Code-level defaults are the TECH.md-era
# aliases which Anthropic retired in 2025; env vars here override for prod.
AI_MODEL_CHAT = "anthropic/claude-haiku-4-5-20251001"
AI_MODEL_PLANNING = "anthropic/claude-sonnet-4-6"

# Observability
[observability]
enabled = true

# Personal/Custom Deployment Template
# Usage: npx wrangler deploy --env personal
# [env.personal]
# name = "mai-fitness-api-custom"
# [[env.personal.d1_databases]]
# binding = "DB"
# database_name = "mai-db-custom"
# database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
# [env.personal.vars]
# GOOGLE_CLIENT_ID = "REPLACE_WITH_YOUR_WEB_CLIENT_ID"
# ALLOWED_ORIGINS = "http://localhost:8081,https://your-custom-domain.com"
# AI_MODEL_CHAT = "openai/gpt-4o-mini"
# AI_MODEL_PLANNING = "openai/gpt-4o"
